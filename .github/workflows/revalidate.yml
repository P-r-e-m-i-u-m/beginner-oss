name: 🔄 Weekly Re-validation — Auto-unlist Dead Repos

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  revalidate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Re-validate all listed repos
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const dataFile = "data/repos.json";
            if (!fs.existsSync(dataFile)) { console.log("No repos.json yet"); return; }
            let repos = JSON.parse(fs.readFileSync(dataFile, "utf8"));
            const before = repos.length;
            const updated = [];
            for (const repo of repos) {
              const [owner, name] = repo.full_name.split("/");
              try {
                const { data } = await github.rest.repos.get({ owner, repo: name });
                const daysSince = Math.floor((Date.now() - new Date(data.pushed_at)) / 86400000);
                if (daysSince > 180 || data.private) continue;
                let gfiCount = 0;
                try {
                  const issues = await github.rest.issues.listForRepo({ owner, repo: name, labels: "good first issue", state: "open", per_page: 10 });
                  gfiCount = issues.data.filter(i => !i.pull_request).length;
                } catch {}
                repo.stars = data.stargazers_count;
                repo.good_first_issues = gfiCount;
                repo.last_commit_days = daysSince;
                repo.last_checked = new Date().toISOString().split("T")[0];
                updated.push(repo);
              } catch { /* repo deleted */ }
            }
            fs.writeFileSync(dataFile, JSON.stringify(updated, null, 2));
            console.log(`Before: ${before} | After: ${updated.length}`);

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/repos.json
          git diff --staged --quiet || git commit -m "chore: weekly re-validation [skip ci]"
          git push
